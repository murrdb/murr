syntax = "proto2";

package model;

enum DType {
  Utf8 = 0;
  i32 = 1;
  f32 = 2;
}

message OffsetSize {
    required uint32 offset = 1;
    required uint32 size = 2;
}

message SegmentSchema {
    repeated SegmentColumnSchema columns = 1;
}

message SegmentColumnSchema {
    required uint32 index = 1;
    required DType dtype = 2;
    required string name = 3;
    required uint32 offset = 4;
}

message SegmentFooter {
    required uint32 version = 1;
    required uint32 name = 2;
    required SegmentSchema schema = 3;
    required OffsetSize keys = 4;
    required OffsetSize rows = 5;
}
